[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "context-pipeline"
version = "0.1.0"
description = "Multi-Resolution Context Pipeline CLI for AI-native code navigation"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
ctx = "context_pipeline.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
context_pipeline = ["resources/*.js", "templates/*.md", "templates/*.json"]
